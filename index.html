<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    header {
      background: #5a4fcf;
      color: #fff;
      padding: 24px;
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      margin-bottom: 4px;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px;
      border-bottom: 1px solid #eee;
    }

    #itemInput {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #itemInput:focus {
      border-color: #5a4fcf;
    }

    #addBtn {
      background: #5a4fcf;
      color: #fff;
      border: none;
      padding: 0 20px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #addBtn:hover {
      background: #4a3fb8;
    }

    ul {
      list-style: none;
      max-height: 420px;
      overflow-y: auto;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f2f2f2;
      transition: background 0.15s;
    }

    li:hover {
      background: #fafafa;
    }

    li .checkbox {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: #5a4fcf;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #333;
      word-break: break-all;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    li .delete-btn {
      background: transparent;
      border: none;
      color: #e74c3c;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    li .delete-btn:hover {
      background: #fdecea;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 20px;
      font-size: 0.95rem;
    }

    .footer {
      padding: 14px 20px;
      font-size: 0.85rem;
      color: #888;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fafafa;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid #ddd;
      color: #888;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }

    .clear-btn:hover {
      background: #e74c3c;
      color: #fff;
      border-color: #e74c3c;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <p>필요한 물건을 추가하고 체크하세요</p>
    </header>

    <div class="input-area">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요..." autocomplete="off">
      <button id="addBtn">추가</button>
    </div>

    <ul id="list"></ul>

    <div class="footer">
      <span id="counter">0개 항목</span>
      <button class="clear-btn" id="clearBtn">완료 항목 삭제</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    // Supabase 설정 (Project Settings > API 에서 확인 가능)
    const SUPABASE_URL = 'https://ncsiptneokmewebatbpl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_JVC7qynC-KMnYJ7KyaBnKg_TxlaMaWn';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const input = document.getElementById('itemInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('list');
    const counter = document.getElementById('counter');
    const clearBtn = document.getElementById('clearBtn');

    let items = [];

    async function loadItems() {
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) {
        console.error('항목을 불러오지 못했습니다:', error);
        items = [];
        return;
      }
      items = data || [];
    }

    function render() {
      list.innerHTML = '';

      if (items.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '아직 항목이 없습니다. 위에서 추가해 보세요!';
        list.appendChild(empty);
      } else {
        items.forEach((item) => {
          const li = document.createElement('li');
          if (item.checked) li.classList.add('checked');

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'checkbox';
          checkbox.checked = item.checked;
          checkbox.addEventListener('change', () => toggleItem(item.id));

          const text = document.createElement('span');
          text.className = 'item-text';
          text.textContent = item.text;

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.innerHTML = '&times;';
          deleteBtn.title = '삭제';
          deleteBtn.addEventListener('click', () => deleteItem(item.id));

          li.append(checkbox, text, deleteBtn);
          list.appendChild(li);
        });
      }

      const remaining = items.filter(i => !i.checked).length;
      counter.textContent = `${items.length}개 항목 (남은 항목 ${remaining}개)`;
    }

    async function addItem() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.focus();

      const { data, error } = await supabase
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();
      if (error) {
        console.error('항목을 추가하지 못했습니다:', error);
        return;
      }
      items.push(data);
      render();
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const newChecked = !item.checked;

      const { error } = await supabase
        .from('shopping_items')
        .update({ checked: newChecked })
        .eq('id', id);
      if (error) {
        console.error('항목을 수정하지 못했습니다:', error);
        return;
      }
      item.checked = newChecked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (error) {
        console.error('항목을 삭제하지 못했습니다:', error);
        return;
      }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearCompleted() {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('checked', true);
      if (error) {
        console.error('완료 항목을 삭제하지 못했습니다:', error);
        return;
      }
      items = items.filter(i => !i.checked);
      render();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addItem();
    });
    clearBtn.addEventListener('click', clearCompleted);

    // 초기 로드
    await loadItems();
    render();
  </script>
</body>
</html>
